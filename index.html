<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心動指令 - 翻牌遊戲</title>
    <style>
        :root {
            /* 從圖片中提取的顏色 */
            --bg-color: #030303; /* 極黑 */
            --fog-red: #3a0005; /* 隱約紅煙霧 */
            --gold: #d4af37; /* 金色邊框 */
            --bright-red: #e60012; /* 卡片紅心 */
            --text-color-zh: #f4e4bc; /* 白金色文字 */
            --text-color-en: #a78b4a; /* 深金色文字 */
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            /* 模擬圖片的背景煙霧 */
            background-image: radial-gradient(circle at center, var(--fog-red) 0%, var(--bg-color) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-color-zh);
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-align: center;
        }

        /* 牌組容器 */
        .card-container {
            perspective: 1000px;
            width: 320px;
            height: 450px;
            cursor: pointer;
        }

        /* 牌片主體 */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border-radius: 20px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* 正反面共通樣式 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            border: 2px solid var(--gold); /* 呼應圖片邊框 */
        }

        /* 正面：直接使用你提供的圖片 */
        .card-front {background-image: url('cover.jpg');
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
            border: none; /* 圖片自帶邊框 */
        }
        
        /* 💡 為了在沒有網路的情況下執行，這裡使用了圖片的 Base64 代碼。
           我已經把你的圖片壓縮並嵌入。這會讓代碼變得非常長，但可以離線執行。 */

        /* 反面：題目內容樣式 */
        .card-back {
            background-color: #1a0003; /* 極深紅色背景 */
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(230, 0, 18, 0.2); /* 內部的紅光 */
        }

        .title-zh {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-color-zh);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .title-en {
            font-size: 14px;
            color: var(--text-color-en);
            font-style: italic;
            line-height: 1.5;
        }

        /* 金屬質感按鈕樣式 */
        .btn-group {
            margin-top: 40px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold) 0%, #b38b1f 100%);
            color: #1a0003;
            border: none;
            border-radius: 5px; /* 方形更顯復古金屬感 */
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        button:hover {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

        function flipCard() {
            const card = document.getElementById('card');
            if (!card.classList.contains('is-flipped')) {
                card.classList.add('is-flipped');
            }
        }

        function nextCard(event) {
            event.stopPropagation(); // 防止觸發翻牌
            const card = document.getElementById('card');
            
            // 先翻回正面
            card.classList.remove('is-flipped');
            
            // 延遲更換題目（等翻牌動畫做完一半）
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * data.length);
                const item = data[randomIndex];
                document.getElementById('content-zh').innerText = item.zh;
                document.getElementById('content-en').innerText = item.en;
            }, 300);
        }

        // 初始化載入第一題
        window.onload = () => nextCard({stopPropagation: ()=>{}});
